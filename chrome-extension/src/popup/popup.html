<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural TTS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <h1 class="popup-title">Natural TTS</h1>
      <div class="header-actions">
        <button
          id="settingsButton"
          class="icon-button"
          title="Settings"
          aria-label="Open settings"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 10.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
            <path d="M14.7 8.6l-1.4-.4c-.1-.4-.3-.8-.5-1.1l.8-1.2c.2-.3.2-.7 0-.9l-1-1c-.3-.3-.7-.3-.9 0l-1.2.8c-.4-.2-.7-.4-1.1-.5l-.4-1.4c-.1-.3-.4-.5-.7-.5h-1.4c-.3 0-.6.2-.7.5l-.4 1.4c-.4.1-.8.3-1.1.5l-1.2-.8c-.3-.2-.7-.2-.9 0l-1 1c-.3.3-.3.7 0 .9l.8 1.2c-.2.4-.4.7-.5 1.1l-1.4.4c-.3.1-.5.4-.5.7v1.4c0 .3.2.6.5.7l1.4.4c.1.4.3.8.5 1.1l-.8 1.2c-.2.3-.2.7 0 .9l1 1c.3.3.7.3.9 0l1.2-.8c.4.2.7.4 1.1.5l.4 1.4c.1.3.4.5.7.5h1.4c.3 0 .6-.2.7-.5l.4-1.4c.4-.1.8-.3 1.1-.5l1.2.8c.3.2.7.2.9 0l1-1c.3-.3.3-.7 0-.9l-.8-1.2c.2-.4.4-.7.5-1.1l1.4-.4c.3-.1.5-.4.5-.7V9.3c0-.3-.2-.6-.5-.7z"/>
          </svg>
        </button>
        <div
          id="statusIndicator"
          class="status-pill status-checking"
          role="status"
          aria-live="polite"
          aria-label="Helper status: checking"
        >
          <span class="status-dot-inner"></span>
          <span class="status-pill-label" id="statusLabel">Checking</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="popup-main">
      <!-- Message Container (for errors/warnings/success) -->
      <div id="messageContainer" class="message" role="status" aria-live="polite" style="display: none;"></div>

      <!-- Voice Selector -->
      <div class="form-group">
        <label for="voiceSelect" class="form-label">Voice:</label>
        <div class="select-wrapper">
          <select
            id="voiceSelect"
            class="form-select"
            aria-label="Select voice for text-to-speech"
          >
            <option value="">Loading voices...</option>
          </select>
          <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Speed Slider -->
      <div class="form-group">
        <div class="form-label-row">
          <label for="speedSlider" class="form-label">Speed:</label>
          <span id="speedValue" class="speed-value" aria-live="polite">1.0x</span>
        </div>
        <div class="slider-container">
          <div class="slider-row">
            <button type="button" class="speed-step" data-delta="-0.1" aria-label="Decrease speed">−</button>
            <input
              type="range"
              id="speedSlider"
              class="form-slider"
              min="0"
              max="1"
              step="0.001"
              value="0.5"
              aria-label="Adjust speech speed"
              aria-valuemin="0.5"
              aria-valuemax="2.0"
              aria-valuenow="1.0"
              aria-valuetext="1.0 times speed"
            >
            <button type="button" class="speed-step" data-delta="0.1" aria-label="Increase speed">+</button>
          </div>
          <div class="slider-labels">
            <span class="slider-label">0.5x</span>
            <span class="slider-label">1.0x</span>
            <span class="slider-label">2.0x</span>
          </div>
        </div>
      </div>

      <!-- Primary Action Button -->
      <button
        id="speakButton"
        class="primary-button"
        aria-label="Generate speech from selected text"
      >
        <svg class="button-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M3.5 6.5v3c0 .3.2.5.5.5h2l3 3V3l-3 3H4c-.3 0-.5.2-.5.5zm9.5 1.5c0-1.1-.5-2.1-1.3-2.8v5.6c.8-.7 1.3-1.7 1.3-2.8zm-1.3-4.7v1.6c1.3.9 2.1 2.4 2.1 4.1 0 1.7-.8 3.2-2.1 4.1v1.6c2.1-1 3.5-3.1 3.5-5.7 0-2.6-1.4-4.7-3.5-5.7z"/>
        </svg>
        <span class="button-spinner" aria-hidden="true"></span>
        <svg class="button-stop-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
          <rect x="2" y="2" width="10" height="10" rx="1"/>
        </svg>
        <span id="buttonText">Speak Selected Text</span>
      </button>

      <!-- Retry Connection Button (shown when helper is disconnected) -->
      <button
        id="retryButton"
        class="secondary-button"
        style="display: none;"
        aria-label="Retry connection to native helper"
      >
        <svg class="button-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.65 2.35c-1.7-1.7-4.6-1.7-6.3 0L6 3.7l1.4 1.4 1.35-1.35c1-1 2.6-1 3.6 0 1 1 1 2.6 0 3.6l-2 2c-1 1-2.6 1-3.6 0L5.3 8l-1.4 1.4 1.4 1.4c1.7 1.7 4.6 1.7 6.3 0l2-2c1.9-1.7 1.9-4.6.05-6.45zM6.7 8L5.3 6.6c-1.7-1.7-4.6-1.7-6.3 0-1.7 1.7-1.7 4.6 0 6.3 1.7 1.7 4.6 1.7 6.3 0L7 11.6 5.7 10.3l-1.35 1.35c-1 1-2.6 1-3.6 0-1-1-1-2.6 0-3.6l2-2c1-1 2.6-1 3.6 0L8 7.4 6.7 8z"/>
        </svg>
        <span>Retry Connection</span>
      </button>
      <footer class="popup-footer">
        <span class="footer-shortcut">⌥⇧S</span>
        <span class="footer-version" id="footerVersion"></span>
      </footer>
    </main>
  </div>

  <!-- Import JavaScript module -->
  <script type="module" src="popup.js"></script>
</body>
</html>
